name: Auto Merge Feature -> Development

on:
  push:
    branches:
      - "feature/*"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git identity
        run: |
          git config --global user.name "adzhanfarhan08"
          git config --global user.email "adzhanfarhan@gmail.com"

      - name: Merge feature branch into development
        run: |
          git fetch origin development
          git checkout development
          git merge --no-ff ${{ github.ref_name }} -m "Auto merge: ${{ github.ref_name }} -> development"
          git push origin development
